apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-owm
  namespace: weather-pipeline
  labels:
    app: mock-owm
    app.kubernetes.io/component: mock
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-owm
  template:
    metadata:
      labels:
        app: mock-owm
    spec:
      containers:
        - name: mock-owm
          image: weather-mock:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: MOCK_OWM_ADDR
              value: ":8081"
            - name: MOCK_OWM_SEED
              value: "42"
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "64Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mock-owm
  namespace: weather-pipeline
spec:
  selector:
    app: mock-owm
  ports:
    - port: 8081
      targetPort: 8081
      name: http
  type: ClusterIP
