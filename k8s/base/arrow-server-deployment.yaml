apiVersion: apps/v1
kind: Deployment
metadata:
  name: arrow-server
  namespace: weather-pipeline
  labels:
    app: arrow-server
    app.kubernetes.io/component: arrow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arrow-server
  template:
    metadata:
      labels:
        app: arrow-server
    spec:
      containers:
        - name: arrowsrv
          image: weather-arrow:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8815
              name: flight
          envFrom:
            - configMapRef:
                name: weather-config
          env:
            - name: KAFKA_BROKERS
              value: "redpanda:9093"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            tcpSocket:
              port: 8815
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: arrow-server
  namespace: weather-pipeline
spec:
  selector:
    app: arrow-server
  ports:
    - port: 8815
      targetPort: 8815
      name: flight
  type: ClusterIP
