apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-collector
  namespace: weather-pipeline
  labels:
    app: go-collector
    app.kubernetes.io/component: collector
spec:
  replicas: 2
  selector:
    matchLabels:
      app: go-collector
  template:
    metadata:
      labels:
        app: go-collector
      annotations:
        # Prometheus scrape (для HPA по custom metrics)
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: collector
          image: weather-collector:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: metrics
          envFrom:
            - configMapRef:
                name: weather-config
          env:
            - name: OWM_MOCK_URL
              value: "http://mock-owm:8081"
            - name: ETCD_ENDPOINTS
              value: "etcd:2379"
            - name: KAFKA_BROKERS
              value: "redpanda:9093"
            - name: NATS_URL
              value: "nats://nats:4222"
            - name: SHARD_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: TOTAL_SHARDS
              value: "2"
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "exit 0"]
            initialDelaySeconds: 10
            periodSeconds: 30
      terminationGracePeriodSeconds: 30
