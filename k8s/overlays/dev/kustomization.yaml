apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namePrefix: dev-

bases:
  - ../../base

# Dev: меньше реплик, образы из локального Docker
patches:
  - path: collector-patch.yaml
  - path: resources-patch.yaml
  - path: configmap-patch.yaml

images:
  - name: weather-collector
    newTag: latest
  - name: weather-arrow
    newTag: latest
  - name: weather-mock
    newTag: latest
