# Уменьшаем реплики и HPA для dev
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-collector
  namespace: weather-pipeline
spec:
  replicas: 1
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: go-collector-hpa
  namespace: weather-pipeline
spec:
  minReplicas: 1
  maxReplicas: 3
