apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namePrefix: prod-

bases:
  - ../../base

patches:
  - path: collector-patch.yaml
  - path: resources-patch.yaml
  - path: configmap-patch.yaml

images:
  - name: weather-collector
    newTag: v1.0.0
  - name: weather-arrow
    newTag: v1.0.0
  - name: weather-mock
    newTag: v1.0.0
