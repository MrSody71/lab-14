# Конфигурация kind-кластера для локальной разработки.
# Один control-plane + два worker узла.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: weather-pipeline
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
      - containerPort: 30815
        hostPort: 30815
        protocol: TCP
  - role: worker
    labels:
      workload: collector
  - role: worker
    labels:
      workload: analytics
